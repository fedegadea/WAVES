                <h3 class="titulo-login-register">Crea tu cuenta</h1> <hr>
                  <div class="formu">
                <form>
                  <div class="row mb-3">
                    <div>
                      <input type="email" class="form-control formuinput" placeholder="Email" id="inputPassword">
                    </div>
                  </div>

                    <div class="row mb-3">
                        <div>

                        </div>
                      </div>

                      <div class="row mb-3">
                        <div>
                          <input type="password" class="form-control formuinput" placeholder="Confirmar contraseña" id="inputConfirm">
                        </div>
                      </div>

                      <div class="row mb-3">
                        <div>
                          <input type="text" class="form-control formuinput" placeholder="Nombre" id="inputName">
                        </div> 
                      </div>

                      <div class="row mb-3">
                        <div>
                          <input type="text" class="form-control formuinput" placeholder="Apellido" id="inputApellido">
                        </div>
                      </div>

                      <div class="row mb-3">
                        <div>
                          <input type="text" class="form-control formuinput" placeholder="País" id="inputPais">
                        </div>
                      </div>

                    <div class="row mb-3">
                      <div>
                        <input type="text" class="form-control formuinput" placeholder="Dirección" id="InputDir">
                      </div>
                    </div>
                  </div>
                    <button type="submit" class="btn btn-formu">Enviar</button>    
                </form>
            </div></div>
        </div>
